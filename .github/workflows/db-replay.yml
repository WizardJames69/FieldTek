name: DB Migration Replay

# Deterministic clean-schema reconstruction gate (PR-DB-1, updated by PR-DB-4).
#
# Nothing else in CI ever builds a database from migration zero: ci.yml has no
# database, and e2e.yml runs against the live remote (an already-migrated DB).
# This job applies EVERY ACTIVE migration to an empty database, in order, and
# fails on the first error, making the repository the source of truth for
# disaster-recovery reconstruction.
#
# "Active" = supabase/migrations/ only. The dormant workflow-template stream lives
# in supabase/migrations-parked/guided-procedures/ (see that directory's README) and is NOT part of
# reconstruction: it was never applied to production, must never be, and the
# Supabase CLI does not read that directory. Because 20260509000000 (the
# is_tenant_admin(uuid, uuid) overload) and its sole consumer 20260510000000 both
# live in the deferred stream, a clean active replay has ONLY the 0-arg
# is_tenant_admin — hence the invariant below asserts exactly ONE overload.

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - '.github/workflows/db-replay.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - '.github/workflows/db-replay.yml'

# One replay per ref; cancel superseded runs.
concurrency:
  group: db-replay-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the job only reads the repo (checkout). No write scopes, and
# no token that could reach any remote Supabase project.
permissions:
  contents: read

jobs:
  replay:
    name: Clean-schema replay from zero
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Clean replay of every migration from zero
        # `supabase start` applies supabase/migrations/*.sql in version order against
        # an empty database and exits non-zero on the FIRST migration error (which is
        # exactly how the is_tenant_admin(uuid, uuid) gap would surface without the
        # 20260509000000 compatibility migration).
        #
        # storage + realtime stay ENABLED on purpose: migrations INSERT INTO
        # storage.buckets and touch the supabase_realtime publication, so a stripped
        # stack fails for harness reasons rather than real drift. Only schema-irrelevant
        # services are excluded, for speed.
        run: supabase start -x studio,imgproxy,edge-runtime,logflare,vector,supavisor

      - name: Assert reconstruction invariants
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        # Cheap smoke: a clean ACTIVE replay must have exactly ONE is_tenant_admin
        # overload — the 0-arg helper. The tenant-scoped 2-arg overload and its only
        # consumer both live in supabase/migrations-parked/guided-procedures/ (PR-DB-4), so they are
        # not part of active reconstruction. If this count is ever 2, a deferred file
        # has leaked back into supabase/migrations/; if 0, the base helper regressed.
        run: |
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "DO \$\$
          DECLARE n int;
          BEGIN
            SELECT count(*) INTO n FROM pg_proc p JOIN pg_namespace ns ON ns.oid = p.pronamespace
              WHERE ns.nspname = 'public' AND p.proname = 'is_tenant_admin';
            IF n <> 1 THEN
              RAISE EXCEPTION 'expected exactly 1 is_tenant_admin overload (0-arg) in an active replay, found % (a deferred migration may have leaked into supabase/migrations/)', n;
            END IF;
            RAISE NOTICE 'PASS: exactly one (0-arg) is_tenant_admin overload present';
          END \$\$;"

      - name: Assert intelligence-flywheel reconstruction (Week 0 reconciliation)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        # 20260723050000 promotes the formerly out-of-band flywheel objects into
        # the ledger. A clean replay MUST now produce them; their silent absence
        # is exactly the replay-from-prod divergence that went undetected before
        # Week 0 (docs/week0-drift-report.md). Scope honesty: this pins three
        # named objects — it is a canary for that specific divergence, NOT
        # general drift detection.
        run: |
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "DO \$\$
          DECLARE t int; f int; nullable text;
          BEGIN
            SELECT count(*) INTO t FROM pg_trigger WHERE tgname = 'trg_collect_workflow_intelligence' AND NOT tgisinternal;
            SELECT count(*) INTO f FROM pg_proc p JOIN pg_namespace ns ON ns.oid = p.pronamespace
              WHERE ns.nspname = 'public' AND p.proname = 'notify_collect_workflow_intelligence';
            SELECT c.is_nullable INTO nullable FROM information_schema.columns c
              WHERE c.table_schema = 'public' AND c.table_name = 'workflow_diagnostic_statistics' AND c.column_name = 'tenant_id';
            IF t <> 1 OR f <> 1 OR nullable IS DISTINCT FROM 'YES' THEN
              RAISE EXCEPTION 'flywheel reconstruction failed: trigger=% function=% tenant_id_nullable=% — replay diverges from production, see docs/week0-drift-report.md', t, f, nullable;
            END IF;
            RAISE NOTICE 'PASS: flywheel trigger + function + nullable tenant_id reconstructed';
          END \$\$;"

      - name: Stable SQL regressions (from-zero schema)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        # Runs every supabase/tests/*.sql EXCEPT the two known-broken RAG fixtures
        # (lexical_rescue / hybrid_similarity omit required document_chunks.chunk_index
        # seeds — a pre-existing test-data defect tracked in a separate maintenance PR;
        # NOT drift). ON_ERROR_STOP fails the job on any assertion failure.
        run: |
          shopt -s nullglob
          fail=0
          for f in supabase/tests/*.sql; do
            case "$(basename "$f")" in
              lexical_rescue_regression.sql|hybrid_similarity_blend_regression.sql)
                echo "::notice::skipping known-broken RAG fixture $(basename "$f")"; continue;;
            esac
            echo "== running $f =="
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f" || fail=1
          done
          exit $fail

      - name: Teardown
        if: always()
        run: supabase stop --no-backup
