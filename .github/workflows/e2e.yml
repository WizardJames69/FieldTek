name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# The whole suite runs against ONE shared live backend (fgem) with fixed-name
# fixtures ("E2E Test Company", Tenant B, e2e-*@fieldtek-test.dev). Two runs in
# parallel delete each other's tenant/users mid-flight. Serialize ALL e2e runs
# into one queue and DO NOT cancel in progress — a run killed mid-teardown would
# strand fixture residue. (The new authorization spec additionally namespaces its
# own disposable fixtures per run, so it is safe even under this queue.)
concurrency:
  group: e2e-shared-backend
  cancel-in-progress: false

# Least privilege: the suite only reads the repo (checkout). Backend access is via
# the explicit secrets below, not the workflow token.
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_CF_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npx playwright test